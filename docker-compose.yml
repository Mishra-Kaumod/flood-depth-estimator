services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     floodwatch
      POSTGRES_PASSWORD: floodwatch
      POSTGRES_DB:       floodwatch
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floodwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (durable job queue) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes   # AOF persistence
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Pipeline + Ingestor (main orchestrator) ─────────────────────────────────
  pipeline:
    build:
      context: .
      target: pipeline
    restart: unless-stopped
    env_file: .env
    environment:
      FLOODWATCH_DB_URL: postgresql://floodwatch:floodwatch@postgres:5432/floodwatch
      REDIS_URL:         redis://redis:6379/0
      PIPELINE_WORKERS:  4
    volumes:
      - ./inbox:/app/inbox
      - ./processing:/app/processing
      - ./archive:/app/archive
      - ./models:/app/models:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 4g

  # ── FastAPI REST server ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      FLOODWATCH_DB_URL: postgresql://floodwatch:floodwatch@postgres:5432/floodwatch
      REDIS_URL:         redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2      # horizontal scale — put a load balancer in front

  # ── Streamlit Dashboard ─────────────────────────────────────────────────────
  ui:
    build:
      context: .
      target: ui
    restart: unless-stopped
    env_file: .env
    environment:
      FLOODWATCH_DB_URL: postgresql://floodwatch:floodwatch@postgres:5432/floodwatch
    ports:
      - "8501:8501"
    depends_on:
      postgres: { condition: service_healthy }

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: floodwatch
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
